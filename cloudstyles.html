<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Wolken: flach vs. volumetrisch — SolarSpeculations</title>
<style>
  body { margin: 0; background: #fff; color: #222; font-family: system-ui, sans-serif; text-align: center; }
  h1 { font-weight: 500; font-size: 1.1rem; margin: 16px 0 4px; letter-spacing: 0.04em; }
  p.hint { color: #777; font-size: 0.85rem; margin: 0 0 6px; }
  #holder { display: flex; justify-content: center; }
  #labels { display: flex; justify-content: center; }
  #labels div { width: 320px; font-size: 0.95rem; color: #333; }
  #labels small { display: block; color: #999; font-size: 0.74rem; line-height: 1.3; margin-top: 2px; }
</style>
</head>
<body>
  <h1>Wolken: flach vs. echtes Volumen</h1>
  <p class="hint">Live animiert. Welcher? (Nummer)</p>
  <div id="holder"></div>
  <div id="labels">
    <div>1 · Aktuell (flach)<small>eine Abtastung, bemalte Flaeche</small></div>
    <div>2 · Volumetrisch<small>Raymarch + Hoehengradient + Selbstschatten</small></div>
  </div>

  <script src="lib/p5.min.js"></script>
  <script>
  const N = 2, SP = 320, R = 110, RO = 1.13;
  let tex, sh;

  const VERT = `
  precision highp float;
  attribute vec3 aPosition;
  uniform mat4 uModelViewMatrix, uProjectionMatrix;
  varying vec3 vDir; varying vec3 vRayDir; varying float vFacing;
  void main(){
    vDir = normalize(aPosition);
    vec3 viewDir = normalize((uModelViewMatrix * vec4(aPosition,1.0)).xyz);
    mat3 m = mat3(uModelViewMatrix);
    mat3 mt = mat3(m[0][0],m[1][0],m[2][0], m[0][1],m[1][1],m[2][1], m[0][2],m[1][2],m[2][2]);
    vRayDir = mt * viewDir;
    vFacing = clamp((m * vDir).z, 0.0, 1.0);
    gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition,1.0);
  }`;

  const FRAG = `
  precision highp float;
  varying vec3 vDir; varying vec3 vRayDir; varying float vFacing;
  uniform float uTime; uniform vec3 uLightModel; uniform int uStyle; uniform float uRO;
  float hash3(vec3 p){ return fract(sin(dot(p, vec3(127.1,311.7,74.7)))*43758.5453); }
  float vnoise3(vec3 p){ vec3 i=floor(p),f=fract(p); vec3 u=f*f*(3.-2.*f);
    return mix(mix(mix(hash3(i+vec3(0.,0.,0.)),hash3(i+vec3(1.,0.,0.)),u.x),mix(hash3(i+vec3(0.,1.,0.)),hash3(i+vec3(1.,1.,0.)),u.x),u.y),
               mix(mix(hash3(i+vec3(0.,0.,1.)),hash3(i+vec3(1.,0.,1.)),u.x),mix(hash3(i+vec3(0.,1.,1.)),hash3(i+vec3(1.,1.,1.)),u.x),u.y),u.z); }
  float fbm3(vec3 p){ float v=0.,a=0.5; for(int k=0;k<4;k++){ v+=a*vnoise3(p); p*=2.0; a*=0.5; } return v; }
  vec3 drift(vec3 d, float t){ float a=t*0.04; float c=cos(a),s=sin(a); return vec3(d.x*c+d.z*s, d.y, -d.x*s+d.z*c); }
  // Dichte an 3D-Punkt p (Modellraum, Oberflaeche=1.0): Erosion + Hoehengradient
  float densityAt(vec3 p, float t){
    float r = length(p);
    float h = clamp((r - 1.0)/(uRO - 1.0), 0.0, 1.0);    // 0 unten, 1 oben
    vec3 dir = drift(p/r, t);
    float shape = fbm3(dir*2.6 + vec3(t*0.02,t*0.03,t*0.015));
    float dd = clamp((shape - 0.45)/0.55, 0.0, 1.0);     // Bedeckung
    float det = fbm3(dir*7.5 + 17.0);
    dd = clamp((dd - det*0.4)/(1.0 - det*0.4), 0.0, 1.0); // Kantenerosion
    float grad = smoothstep(0.0,0.18,h) * (1.0 - smoothstep(0.5,1.0,h)); // flach unten, bauschig
    return dd * grad;
  }
  void main(){
    float latFade = 1.0 - smoothstep(0.5, 0.9, abs(vDir.y));
    float rim = smoothstep(0.08, 0.36, vFacing);
    if(uStyle==0){
      vec3 dir=drift(vDir,uTime); float raw=fbm3(dir*3.2 + vec3(uTime*0.02,uTime*0.035,uTime*0.015));
      float al = smoothstep(0.60,0.82,raw)*latFade*rim*0.72;
      if(al<0.012) discard;
      gl_FragColor = vec4(vec3(0.97,0.98,0.99), al);
    } else {
      vec3 ro = vDir*uRO; vec3 rd = normalize(vRayDir);
      float b = dot(ro,rd); float disc = b*b-(dot(ro,ro)-1.0);
      float tEnd = disc>0.0 ? (-b-sqrt(disc)) : (-b+sqrt(b*b-(dot(ro,ro)-uRO*uRO)));
      tEnd = clamp(tEnd, 0.0, 0.45);
      float dt = tEnd/12.0;
      float cosT = dot(rd, -uLightModel); float g=0.5; float kk=1.55*g-0.55*g*g*g;
      float dd2=1.0+kk*cosT; float phase=(1.0-kk*kk)/(12.566*dd2*dd2);
      vec3 acc=vec3(0.0); float T=1.0;
      for(int i=0;i<12;i++){
        vec3 pos = ro + rd*((float(i)+0.5)*dt);
        float dens = densityAt(pos,uTime)*latFade;
        if(dens>0.002){
          float ld=0.0; vec3 lp=pos;
          for(int j=0;j<4;j++){ lp += uLightModel*0.05; ld += densityAt(lp,uTime); }
          float lightT = exp(-ld*1.7);                       // Selbstschatten
          float lit = 0.28 + 0.72*lightT;
          vec3 c = mix(vec3(0.46,0.53,0.66), vec3(1.0,1.0,1.0), lit) * (0.85 + 0.6*phase*lightT);
          float aStep = 1.0 - exp(-dens*dt*16.0);
          acc += T*aStep*c; T *= (1.0-aStep);
          if(T<0.02) break;
        }
      }
      float alpha = (1.0 - T)*rim;
      if(alpha<0.01) discard;
      gl_FragColor = vec4(clamp(acc/max(1.0-T,0.001),0.0,1.0), clamp(alpha,0.0,0.95));
    }
  }`;

  function lightModel(tilt, spin){
    let L=[-0.45,-0.5,0.74]; const m=Math.hypot(L[0],L[1],L[2]); L=L.map(v=>v/m);
    let a=-tilt, c=Math.cos(a), s=Math.sin(a); L=[L[0], L[1]*c-L[2]*s, L[1]*s+L[2]*c];
    a=-spin; c=Math.cos(a); s=Math.sin(a); L=[L[0]*c+L[2]*s, L[1], -L[0]*s+L[2]*c];
    return L;
  }
  function preload(){ tex = loadImage('assets/images/entities/scene1/world.png'); }
  function setup(){ const c=createCanvas(N*SP, 300, WEBGL); c.parent('holder'); sh=createShader(VERT,FRAG); noStroke(); }
  function draw(){
    clear(); const gl=drawingContext; gl.enable(gl.DEPTH_TEST);
    const spin = millis()/1000 * -0.1, tilt = 0.0;
    const Lm = lightModel(tilt, spin);
    for(let i=0;i<N;i++){
      push(); translate(-width/2 + SP/2 + i*SP, 0, 0);
      push(); rotateX(tilt); rotateY(spin); texture(tex); sphere(R,48,36); pop();
      blendMode(BLEND);
      gl.enable(gl.CULL_FACE); gl.cullFace(gl.FRONT); gl.depthMask(false);
      push(); shader(sh);
      sh.setUniform('uTime', millis()/1000); sh.setUniform('uLightModel', Lm); sh.setUniform('uStyle', i); sh.setUniform('uRO', RO);
      rotateX(tilt); rotateY(spin); sphere(R*RO, 72, 54); pop();
      resetShader(); gl.depthMask(true); gl.disable(gl.CULL_FACE);
      pop();
    }
  }
  </script>
</body>
</html>
