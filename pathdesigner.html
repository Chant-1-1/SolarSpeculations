<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Path Designer — SolarSpeculations</title>
<style>
  body { margin: 0; background: #0b0f13; color: #e8eef2; font-family: system-ui, sans-serif; display: flex; }
  #side { width: 320px; padding: 16px; background: #11171d; height: 100vh; overflow-y: auto; box-sizing: border-box; }
  #stage { flex: 1; display: flex; align-items: center; justify-content: center; height: 100vh; }
  h1 { font-size: 1.1rem; margin: 0 0 12px; letter-spacing: 0.05em; }
  h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #8aa0ad; margin: 18px 0 6px; }
  label { display: block; font-size: 0.8rem; color: #8aa0ad; margin: 8px 0 2px; }
  input, select, button { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-bottom: 6px;
    background: #1a2229; border: 1px solid #2a343d; color: #e8eef2; border-radius: 4px; font-size: 0.85rem; }
  button { cursor: pointer; background: #233; border-color: #355; }
  button:hover { background: #2c4040; }
  .row { display: flex; gap: 6px; }
  .row > * { flex: 1; }
  textarea { width: 100%; height: 160px; box-sizing: border-box; background: #0c1116; color: #9ad;
    border: 1px solid #2a343d; border-radius: 4px; font-family: monospace; font-size: 0.8rem; padding: 8px; }
  .hint { font-size: 0.75rem; color: #6b7d89; line-height: 1.5; }
  canvas { background: #000; max-width: 100%; max-height: 100vh; cursor: crosshair; display: block; }
</style>
</head>
<body>
  <div id="side">
    <h1>Path Designer</h1>
    <p class="hint">Klicken = Wegpunkt setzen · ziehen = verschieben · Rechtsklick/Doppelklick auf Punkt = loeschen.
      Ausgabe ist normalisiert (0–1) fuer <code>entities.json</code>.</p>

    <h2>Hintergrund</h2>
    <label>Bild laden (lokal)</label>
    <input type="file" id="file" accept="image/*" />
    <label>oder Pfad aus Repo</label>
    <div class="row">
      <input type="text" id="bgpath" placeholder="assets/images/backgrounds/scene1.jpg" />
      <button id="loadbg" style="flex:0 0 60px">laden</button>
    </div>

    <h2>Vorschau-Entity</h2>
    <label>Bewegung (loop)</label>
    <select id="loop">
      <option value="loop">loop</option>
      <option value="pingpong">pingpong</option>
      <option value="drift">drift</option>
    </select>
    <label>Tempo (speed)</label>
    <input type="range" id="speed" min="0.005" max="0.15" step="0.005" value="0.04" />

    <div class="row">
      <button id="clear">Pfad leeren</button>
      <button id="copy">JSON kopieren</button>
    </div>

    <h2>Ausgabe (path)</h2>
    <textarea id="out" readonly></textarea>
  </div>
  <div id="stage"><canvas id="c"></canvas></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 1280, H = 720;
canvas.width = W; canvas.height = H;

let bg = null;
let pts = [];           // {x,y} in 0..1
let dragIdx = -1;
let u = 0, dir = 1;

// ---- Catmull-Rom (identisch zu app.js) ----
function catmull(p0,p1,p2,p3,t){const t2=t*t,t3=t2*t;return 0.5*((2*p1)+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t2+(-p0+3*p1-3*p2+p3)*t3);}
function pointAt(P,p,closed){const n=P.length;if(n===0)return{x:.5,y:.5};if(n===1)return{...P[0]};
  if(n===2)return{x:P[0].x+(P[1].x-P[0].x)*p,y:P[0].y+(P[1].y-P[0].y)*p};
  const segs=closed?n:n-1;let fp=p*segs,i=Math.floor(fp),t=fp-i;
  if(closed){i=((i%segs)+segs)%segs;}else{if(i>=segs){i=segs-1;t=1;}if(i<0){i=0;t=0;}}
  const idx=k=>closed?((k%n)+n)%n:Math.max(0,Math.min(n-1,k));
  const a=P[idx(i-1)],b=P[idx(i)],c=P[idx(i+1)],d=P[idx(i+2)];
  return{x:catmull(a.x,b.x,c.x,d.x,t),y:catmull(a.y,b.y,c.y,d.y,t)};}

function toPx(p){return{x:p.x*W,y:p.y*H};}
function hit(mx,my){for(let i=0;i<pts.length;i++){const q=toPx(pts[i]);if(Math.hypot(mx-q.x,my-q.y)<12)return i;}return -1;}

canvas.addEventListener('mousedown',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  if(e.button===2)return;
  const h=hit(mx,my);
  if(h>=0){dragIdx=h;}
  else{pts.push({x:mx/W,y:my/H});refresh();}
});
canvas.addEventListener('mousemove',e=>{
  if(dragIdx<0)return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  pts[dragIdx]={x:Math.max(0,Math.min(1,mx/W)),y:Math.max(0,Math.min(1,my/H))};refresh();
});
window.addEventListener('mouseup',()=>dragIdx=-1);
canvas.addEventListener('contextmenu',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);const h=hit(mx,my);if(h>=0){pts.splice(h,1);refresh();}});
canvas.addEventListener('dblclick',e=>{const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);const h=hit(mx,my);if(h>=0){pts.splice(h,1);refresh();}});

document.getElementById('file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const img=new Image();
  img.onload=()=>{bg=img;fitCanvas(img.width,img.height);};img.src=URL.createObjectURL(f);
});
document.getElementById('loadbg').addEventListener('click',()=>{
  const p=document.getElementById('bgpath').value.trim();if(!p)return;const img=new Image();
  img.onload=()=>{bg=img;fitCanvas(img.width,img.height);};img.onerror=()=>alert('Bild nicht gefunden: '+p);img.src=p;
});
function fitCanvas(iw,ih){const maxW=1600,maxH=900;let s=Math.min(maxW/iw,maxH/ih,1);W=Math.round(iw*s);H=Math.round(ih*s);canvas.width=W;canvas.height=H;}

document.getElementById('clear').addEventListener('click',()=>{pts=[];refresh();});
document.getElementById('copy').addEventListener('click',()=>{navigator.clipboard.writeText(document.getElementById('out').value);});

function refresh(){
  document.getElementById('out').value = JSON.stringify(
    pts.map(p=>({x:+p.x.toFixed(4),y:+p.y.toFixed(4)})), null, 2);
}

function frame(){
  requestAnimationFrame(frame);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(bg)ctx.drawImage(bg,0,0,W,H);

  const closed=document.getElementById('loop').value==='loop'&&pts.length>2;
  // Pfadlinie
  if(pts.length>1){
    ctx.strokeStyle='rgba(216,178,90,0.6)';ctx.lineWidth=2;ctx.beginPath();
    const steps=200;for(let i=0;i<=steps;i++){const q=toPx(pointAt(pts,i/steps,closed));if(i===0)ctx.moveTo(q.x,q.y);else ctx.lineTo(q.x,q.y);}
    ctx.stroke();
  }
  // Wegpunkte
  pts.forEach((p,i)=>{const q=toPx(p);ctx.fillStyle='#d8b25a';ctx.beginPath();ctx.arc(q.x,q.y,6,0,7);ctx.fill();
    ctx.fillStyle='#000';ctx.font='10px sans-serif';ctx.fillText(i,q.x-3,q.y+3);});

  // Vorschau-Entity
  if(pts.length>=1){
    const sp=+document.getElementById('speed').value;const mode=document.getElementById('loop').value;
    u+=sp*0.016*dir;
    if(mode==='pingpong'){if(u>1){u=1;dir=-1;}if(u<0){u=0;dir=1;}}
    else if(mode==='drift'){if(u>1)u=0;}
    else{u=(u%1+1)%1;}
    const q=toPx(pointAt(pts,u,closed));
    ctx.fillStyle='rgba(120,200,255,0.9)';ctx.beginPath();ctx.arc(q.x,q.y,14,0,7);ctx.fill();
    ctx.fillStyle='rgba(120,200,255,0.25)';ctx.beginPath();ctx.arc(q.x,q.y,26,0,7);ctx.fill();
  }
}
refresh();frame();
</script>
</body>
</html>
