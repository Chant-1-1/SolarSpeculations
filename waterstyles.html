<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Wasser-Stile vergleichen — SolarSpeculations</title>
<style>
  body { margin: 0; background: #fff; color: #222; font-family: system-ui, sans-serif; text-align: center; }
  h1 { font-weight: 500; font-size: 1.1rem; margin: 16px 0 4px; letter-spacing: 0.04em; }
  p.hint { color: #777; font-size: 0.85rem; margin: 0 0 10px; }
  #holder { display: flex; justify-content: center; }
  #labels { display: flex; justify-content: center; gap: 0; margin-top: 4px; }
  #labels div { width: 200px; font-size: 0.9rem; color: #333; }
  #labels small { display: block; color: #999; font-size: 0.72rem; line-height: 1.3; margin-top: 2px; }
</style>
</head>
<body>
  <h1>Wasser-/Strömungs-Stile</h1>
  <p class="hint">Alle live animiert. Welcher gefällt dir? (Nummer)</p>
  <div id="holder"></div>
  <div id="labels">
    <div>1 · Aktuell<small>kleinteilig, schnell</small></div>
    <div>2 · Stromlinien<small>ruhig, entlang Strömung</small></div>
    <div>3 · Schimmern<small>sehr subtil</small></div>
    <div>4 · Grafisch<small>klare Kartenlinien</small></div>
    <div>5 · Ohne<small>ruhiges Wasser</small></div>
  </div>

  <script src="lib/p5.min.js"></script>
  <script>
  const N = 5, SP = 200, R = 78;
  let tex, flow, sh;

  const VERT = `
  precision highp float;
  attribute vec3 aPosition; attribute vec2 aTexCoord;
  uniform mat4 uModelViewMatrix, uProjectionMatrix;
  varying vec2 vUV;
  void main(){ vUV = aTexCoord; gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition,1.0); }`;

  const FRAG = `
  precision highp float;
  varying vec2 vUV;
  uniform sampler2D uTex, uFlow;
  uniform float uTime; uniform int uStyle;
  float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){ vec2 i=floor(p),f=fract(p);
    float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
    vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
  void main(){
    vec4 base = texture2D(uTex, vUV);
    float water = step(base.b,0.62)*step(base.r,base.b-0.04)*step(base.g,base.b);
    vec3 fdat = texture2D(uFlow, vUV).rgb;
    vec2 flow = fdat.rg*2.-1.; float spd = fdat.b;
    vec3 col = base.rgb;
    if(uStyle==0){
      vec2 fc=vUV*vec2(90.,45.); float t=uTime*0.16,p1=fract(t),p2=fract(t+0.5);
      float fl=mix(noise(fc-flow*p1*9.),noise(fc-flow*p2*9.),abs(p1-0.5)*2.);
      col += water*smoothstep(0.5,0.9,fl)*spd*0.16*vec3(0.55,0.72,0.95);
    } else if(uStyle==1){
      vec2 dir=normalize(flow+vec2(1e-4)); vec2 perp=vec2(-dir.y,dir.x);
      vec2 uvs=vUV*vec2(55.,28.); float along=dot(uvs,dir),across=dot(uvs,perp);
      float t=uTime*0.09,p1=fract(t),p2=fract(t+0.5);
      float n1=noise(vec2(along*0.45-p1*5., across*2.2));
      float n2=noise(vec2(along*0.45-p2*5., across*2.2));
      float fl=mix(n1,n2,abs(p1-0.5)*2.);
      col += water*smoothstep(0.55,0.9,fl)*spd*0.15*vec3(0.6,0.78,0.96);
    } else if(uStyle==2){
      vec2 fc=vUV*vec2(38.,19.);
      float n=noise(fc-flow*fract(uTime*0.07)*4.);
      col += water*smoothstep(0.45,0.95,n)*spd*0.06*vec3(0.6,0.75,0.92);
    } else if(uStyle==3){
      vec2 dir=normalize(flow+vec2(1e-4)); vec2 perp=vec2(-dir.y,dir.x);
      vec2 uvs=vUV*vec2(60.,30.); float across=dot(uvs,perp),along=dot(uvs,dir);
      float v=sin(across*3.1416 + noise(vec2(along*0.3,across*0.5))*6.0 - fract(uTime*0.08)*6.283);
      col = mix(col, vec3(0.82,0.9,1.0), water*smoothstep(0.84,0.97,v)*0.5);
    }
    gl_FragColor = vec4(col, base.a);
  }`;

  function preload(){
    tex = loadImage('assets/images/entities/scene1/world.png');
    flow = loadImage('assets/images/entities/scene1/flow.png');
  }
  function setup(){
    const c = createCanvas(N*SP, 220, WEBGL); c.parent('holder');
    sh = createShader(VERT, FRAG);
    noStroke();
  }
  function draw(){
    clear();
    const gl = drawingContext; gl.enable(gl.DEPTH_TEST);
    const ang = millis()/1000 * -0.1;
    for(let i=0;i<N;i++){
      push();
      translate(-width/2 + SP/2 + i*SP, 0, 0);
      shader(sh);
      sh.setUniform('uTex', tex);
      sh.setUniform('uFlow', flow);
      sh.setUniform('uTime', millis()/1000);
      sh.setUniform('uStyle', i);
      rotateY(ang);
      sphere(R, 60, 44);
      pop();
    }
    resetShader();
  }
  </script>
</body>
</html>
